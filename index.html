<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OMG BABY</title>
<style>
body {
    margin:0;
    height:100vh;
    overflow:hidden;
    position:relative;
    user-select:none;
    background:black;
}
.bg-layer {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:0;
}
#toy { position:absolute; cursor:pointer; z-index:2; display:none; }
#nextBtnImg,#startBtnImg,#retryBtnImg,#soundOnBtnImg {
    position:absolute; cursor:pointer; z-index:50; width:20%; height:auto; display:none;
}
#nextBtnImg { bottom:5%; left:50%; transform:translateX(-50%); }
#startBtnImg { bottom:40%; left:76%; transform:translateX(-50%); }
#retryBtnImg { bottom:6%; left:50%; transform:translateX(-50%); }
#soundOnBtnImg { bottom:42%; left:50%; transform:translateX(-50%); width:14%; }
</style>
</head>
<body>

<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>

<img id="toy">

<img id="startBtnImg" src="startbtn.png">
<img id="nextBtnImg" src="nextbtn.png">
<img id="retryBtnImg" src="retrybtn.png">
<img id="soundOnBtnImg" src="onbtn.png">

<audio id="bgm" src="bgm.mp3" loop></audio>

<script>

document.addEventListener("DOMContentLoaded", () => {

const bg1 = document.getElementById("bg1");
const bg2 = document.getElementById("bg2");
const startBtn = document.getElementById("startBtnImg");
const soundBtn = document.getElementById("soundOnBtnImg");
const nextBtn = document.getElementById("nextBtnImg");
const retryBtn = document.getElementById("retryBtnImg");
const bgm = document.getElementById("bgm");

let currentBg = 1;

function setBackground(src){
    const next = currentBg === 1 ? bg2 : bg1;
    next.style.backgroundImage = `url(${src})`;
    bg1.style.zIndex = next === bg1 ? 1 : 0;
    bg2.style.zIndex = next === bg2 ? 1 : 0;
    currentBg = currentBg === 1 ? 2 : 1;
}

// 初期画面（絶対出る）
setBackground("onryou.jpg");
soundBtn.style.display = "block";

// 音ON
soundBtn.onclick = () => {
    bgm.currentTime = 0;
    bgm.play().catch(()=>{});
    soundBtn.style.display = "none";

    setBackground("startbg.jpg");
    startBtn.style.display = "block";
};

// スタート（とりあえず動作確認用）
startBtn.onclick = () => {
    startBtn.style.display = "none";
    setBackground("heya1.jpg");
    nextBtn.style.display = "block";
};

// next（仮）
nextBtn.onclick = () => {
    nextBtn.style.display = "none";
    retryBtn.style.display = "block";
};

// retry
retryBtn.onclick = () => {
    retryBtn.style.display = "none";
    setBackground("startbg.jpg");
    startBtn.style.display = "block";
};

});

</script>
</body>
</html>
